query Items($filters: ItemsFiltersInput!) {
	items(filters: $filters) {
		items {
			id
			name
			address
			imagePaths
			imagesCount
			hourPrice
			shiftPrice
			minHours
			averageRating
			reviewsCount
			createdAt
			properties {
				value
				attribute {
					name
				}
			}
			user {
				name
				avatarPath
				phone
				itemsCount
				createdAt
			}
		}
		pages
	}
}
